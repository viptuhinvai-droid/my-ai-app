<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>আমার AI অ্যাপ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
  body {
    background: #0f172a;
    color: #e2e8f0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 16px 24px;
    background: #1e293b;
    border-bottom: 1px solid #334155;
    font-size: 18px;
    font-weight: 600;
  }
  #chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .message {
    max-width: 70%;
    padding: 12px 16px;
    border-radius: 14px;
    line-height: 1.5;
    white-space: pre-wrap;
  }
  .user {
    align-self: flex-end;
    background: #2563eb;
    color: white;
    border-bottom-right-radius: 4px;
  }
  .assistant {
    align-self: flex-start;
    background: #1e293b;
    border: 1px solid #334155;
    border-bottom-left-radius: 4px;
  }
  .typing {
    align-self: flex-start;
    color: #94a3b8;
    font-style: italic;
    padding: 8px 16px;
  }
  #input-area {
    display: flex;
    padding: 16px;
    background: #1e293b;
    border-top: 1px solid #334155;
    gap: 10px;
  }
  #user-input {
    flex: 1;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid #334155;
    background: #0f172a;
    color: white;
    font-size: 15px;
    outline: none;
  }
  #send-btn {
    padding: 12px 24px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 15px;
  }
  #send-btn:hover { background: #1d4ed8; }
  #send-btn:disabled { background: #475569; cursor: not-allowed; }
</style>
</head>
<body>

<header>🤖 আমার AI অ্যাপ</header>

<div id="chat-container"></div>

<div id="input-area">
  <input type="text" id="user-input" placeholder="কিছু জিজ্ঞেস করো..." />
  <button id="send-btn">পাঠাও</button>
</div>

<script>
  const BACKEND_URL = 'http://localhost:3001/api/chat'; // তোমার backend সার্ভারের ঠিকানা

  const chatContainer = document.getElementById('chat-container');
  const userInput = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');

  let history = [];

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.textContent = text;
    chatContainer.appendChild(div);
    chatContainer.scrollTop = chatContainer.scrollHeight;
    return div;
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    addMessage('user', text);
    history.push({ role: 'user', content: text });
    userInput.value = '';
    sendBtn.disabled = true;

    const typingDiv = document.createElement('div');
    typingDiv.className = 'typing';
    typingDiv.textContent = 'লিখছে...';
    chatContainer.appendChild(typingDiv);
    chatContainer.scrollTop = chatContainer.scrollHeight;

    try {
      const res = await fetch(BACKEND_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history }),
      });
      const data = await res.json();

      typingDiv.remove();

      if (data.error) {
        addMessage('assistant', '⚠️ সমস্যা হয়েছে: ' + data.error);
      } else {
        addMessage('assistant', data.reply);
        history.push({ role: 'assistant', content: data.reply });
      }
    } catch (err) {
      typingDiv.remove();
      addMessage('assistant', '⚠️ সার্ভারের সাথে যোগাযোগ করা যাচ্ছে না। Backend চালু আছে কিনা দেখো।');
    }

    sendBtn.disabled = false;
    userInput.focus();
  }

  sendBtn.addEventListener('click', sendMessage);
  userInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendMessage();
  });
</script>

</body>
</html>
