<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MENTIX AI</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

  :root {
    --bg: #ffffff;
    --sidebar-bg: #f7f7f8;
    --text: #1e1e1e;
    --text-muted: #6b7280;
    --border: #e5e7eb;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --bubble-user: #2563eb;
    --bubble-assistant: #f3f4f6;
    --input-bg: #ffffff;
  }
  [data-theme="dark"] {
    --bg: #1a1a1a;
    --sidebar-bg: #111113;
    --text: #ececec;
    --text-muted: #9ca3af;
    --border: #2e2e2e;
    --accent: #3b82f6;
    --accent-hover: #60a5fa;
    --bubble-user: #2563eb;
    --bubble-assistant: #2a2a2a;
    --input-bg: #2a2a2a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  #sidebar {
    width: 260px;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 16px 12px;
    flex-shrink: 0;
    transition: margin-left 0.2s ease;
  }
  #sidebar.hidden { margin-left: -260px; }
  #sidebar-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 4px 20px;
    font-weight: 700;
    font-size: 16px;
    color: var(--accent);
  }
  #new-chat-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    font-size: 14px;
    margin-bottom: 8px;
  }
  #new-chat-btn:hover { background: var(--border); }
  .sidebar-spacer { flex: 1; }
  .sidebar-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 14px;
    width: 100%;
    text-align: left;
  }
  .sidebar-btn:hover { background: var(--border); color: var(--text); }

  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  #menu-toggle {
    background: none;
    border: none;
    color: var(--text);
    cursor: pointer;
    font-size: 20px;
    padding: 4px 8px;
  }
  header .title { font-weight: 600; }

  #auth-screen {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  #auth-box {
    background: var(--sidebar-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 24px;
    width: 100%;
    max-width: 360px;
  }
  #auth-box h2 { text-align: center; margin-bottom: 20px; }
  #auth-box input {
    width: 100%;
    padding: 12px 14px;
    margin-bottom: 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--input-bg);
    color: var(--text);
    font-size: 15px;
    outline: none;
  }
  #auth-error { color: #ef4444; font-size: 13px; margin-bottom: 12px; display: none; }
  .auth-btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    cursor: pointer;
    margin-bottom: 10px;
    font-weight: 600;
  }
  #login-btn { background: var(--accent); color: white; }
  #login-btn:hover { background: var(--accent-hover); }
  #signup-btn { background: var(--border); color: var(--text); }
  #google-btn {
    background: var(--input-bg);
    color: var(--text);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .divider { text-align: center; color: var(--text-muted); font-size: 13px; margin: 14px 0; }

  #app-screen { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  #chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-width: 720px;
    margin: 0 auto;
    width: 100%;
  }
  .message { max-width: 75%; padding: 12px 16px; border-radius: 16px; line-height: 1.6; white-space: pre-wrap; }
  .assistant p { margin-bottom: 10px; }
  .assistant p:last-child { margin-bottom: 0; }
  .assistant ul, .assistant ol { margin: 8px 0 8px 20px; }
  .assistant li { margin-bottom: 4px; }
  .assistant h1, .assistant h2, .assistant h3 { margin: 12px 0 8px; }
  .assistant strong { font-weight: 700; }
  .assistant code {
    background: rgba(0,0,0,0.08);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
  }
  .assistant pre {
    background: rgba(0,0,0,0.08);
    padding: 10px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 8px 0;
  }
  .assistant pre code { background: none; padding: 0; }

  #welcome-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  #welcome-screen .icon { font-size: 40px; margin-bottom: 12px; }
  #welcome-screen h1 { font-size: 26px; font-weight: 600; color: var(--text); }
  .user { align-self: flex-end; background: var(--bubble-user); color: white; border-bottom-right-radius: 4px; }
  .assistant { align-self: flex-start; background: var(--bubble-assistant); color: var(--text); border-bottom-left-radius: 4px; }
  .typing { align-self: flex-start; color: var(--text-muted); font-style: italic; padding: 8px 16px; }
  #input-area {
    display: flex;
    padding: 16px;
    border-top: 1px solid var(--border);
    gap: 10px;
    max-width: 720px;
    margin: 0 auto;
    width: 100%;
  }
  #user-input {
    flex: 1;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--input-bg);
    color: var(--text);
    font-size: 15px;
    outline: none;
  }
  #send-btn {
    padding: 12px 24px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-size: 15px;
  }
  #send-btn:hover { background: var(--accent-hover); }
  #send-btn:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">🤖 MENTIX AI</div>
  <button id="new-chat-btn">+ নতুন চ্যাট</button>
  <div class="sidebar-spacer"></div>
  <button class="sidebar-btn" id="theme-toggle">
    <span id="theme-label">🌙 ডার্ক মোড</span>
  </button>
  <button class="sidebar-btn" id="logout-btn">🚪 লগ আউট</button>
</div>

<div id="main">
  <header>
    <button id="menu-toggle">☰</button>
    <span class="title">MENTIX AI</span>
  </header>

  <div id="auth-screen">
    <div id="auth-box">
      <h2 id="auth-title">লগইন করো</h2>
      <div id="auth-error"></div>
      <input type="email" id="email-input" placeholder="ইমেইল" />
      <input type="password" id="password-input" placeholder="পাসওয়ার্ড" />
      <button class="auth-btn" id="login-btn">লগইন</button>
      <button class="auth-btn" id="signup-btn">নতুন অ্যাকাউন্ট বানাও</button>
      <div class="divider">অথবা</div>
      <button class="auth-btn" id="google-btn">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.6 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 3l5.7-5.7C34.6 6.1 29.6 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.8 1.1 8 3l5.7-5.7C34.6 6.1 29.6 4 24 4c-7.7 0-14.3 4.4-17.7 10.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 10-2 13.5-5.2l-6.2-5.2C29.3 35.4 26.8 36 24 36c-5.3 0-9.6-3.4-11.3-8.1l-6.5 5C9.6 39.6 16.3 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.2-4.2 5.6l6.2 5.2C40.8 36 44 30.5 44 24c0-1.3-.1-2.7-.4-3.5z"/></svg>
        Google দিয়ে লগইন
      </button>
    </div>
  </div>

  <div id="app-screen">
    <div id="welcome-screen">
      <div class="icon">✨</div>
      <h1 id="welcome-text">স্বাগতম</h1>
    </div>
    <div id="chat-container" style="display:none;"></div>
    <div id="input-area">
      <input type="text" id="user-input" placeholder="কিছু জিজ্ঞেস করো..." />
      <button id="send-btn">পাঠাও</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import {
    getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
    signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
  import {
    getFirestore, doc, getDoc, setDoc
  } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBQzxWv4Pgoxc9SQfvhMyEcCXmidBSYp1g",
    authDomain: "mentix-ai-2b626.firebaseapp.com",
    projectId: "mentix-ai-2b626",
    storageBucket: "mentix-ai-2b626.firebasestorage.app",
    messagingSenderId: "476825175093",
    appId: "1:476825175093:web:964e8bbc5cf8edcd0c9d7c"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const googleProvider = new GoogleAuthProvider();
  let currentUserId = null;

  const authScreen = document.getElementById('auth-screen');
  const appScreen = document.getElementById('app-screen');
  const logoutBtn = document.getElementById('logout-btn');
  const authError = document.getElementById('auth-error');

  function showError(msg) { authError.textContent = msg; authError.style.display = 'block'; }
  function clearError() { authError.style.display = 'none'; }

  document.getElementById('login-btn').addEventListener('click', async () => {
    clearError();
    const email = document.getElementById('email-input').value.trim();
    const password = document.getElementById('password-input').value;
    try { await signInWithEmailAndPassword(auth, email, password); }
    catch (err) { showError('লগইন ব্যর্থ: ' + err.message); }
  });

  document.getElementById('signup-btn').addEventListener('click', async () => {
    clearError();
    const email = document.getElementById('email-input').value.trim();
    const password = document.getElementById('password-input').value;
    try { await createUserWithEmailAndPassword(auth, email, password); }
    catch (err) { showError('অ্যাকাউন্ট তৈরি ব্যর্থ: ' + err.message); }
  });

  document.getElementById('google-btn').addEventListener('click', async () => {
    clearError();
    try { await signInWithPopup(auth, googleProvider); }
    catch (err) { showError('Google লগইন ব্যর্থ: ' + err.message); }
  });

  logoutBtn.addEventListener('click', () => signOut(auth));

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUserId = user.uid;
      const name = user.displayName || (user.email ? user.email.split('@')[0] : 'বন্ধু');
      document.getElementById('welcome-text').textContent = `স্বাগতম, ${name}`;
      authScreen.style.display = 'none';
      appScreen.style.display = 'flex';
      await loadChatHistory();
    } else {
      currentUserId = null;
      authScreen.style.display = 'flex';
      appScreen.style.display = 'none';
    }
  });

  const welcomeScreen = document.getElementById('welcome-screen');

  function showWelcome() {
    welcomeScreen.style.display = 'flex';
    chatContainer.style.display = 'none';
  }
  function showChat() {
    welcomeScreen.style.display = 'none';
    chatContainer.style.display = 'flex';
  }

  async function loadChatHistory() {
    if (!currentUserId) return;
    try {
      const snap = await getDoc(doc(db, 'chats', currentUserId));
      chatContainer.innerHTML = '';
      if (snap.exists() && Array.isArray(snap.data().messages) && snap.data().messages.length > 0) {
        history = snap.data().messages;
        history.forEach(m => addMessage(m.role === 'user' ? 'user' : 'assistant', m.content));
        showChat();
      } else {
        history = [];
        showWelcome();
      }
    } catch (err) {
      console.error('History load failed:', err);
    }
  }

  async function saveChatHistory() {
    if (!currentUserId) return;
    try {
      await setDoc(doc(db, 'chats', currentUserId), { messages: history });
    } catch (err) {
      console.error('History save failed:', err);
    }
  }

  const themeToggle = document.getElementById('theme-toggle');
  const themeLabel = document.getElementById('theme-label');
  let currentTheme = 'light';
  themeToggle.addEventListener('click', () => {
    currentTheme = currentTheme === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', currentTheme);
    themeLabel.textContent = currentTheme === 'light' ? '🌙 ডার্ক মোড' : '☀️ লাইট মোড';
  });

  const sidebar = document.getElementById('sidebar');
  document.getElementById('menu-toggle').addEventListener('click', () => {
    sidebar.classList.toggle('hidden');
  });

  document.getElementById('new-chat-btn').addEventListener('click', async () => {
    history = [];
    chatContainer.innerHTML = '';
    showWelcome();
    await saveChatHistory();
  });

  const BACKEND_URL = 'https://my-ai-app-ahk7.onrender.com/api/chat';
  const chatContainer = document.getElementById('chat-container');
  const userInput = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  let history = [];

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = `message ${role}`;
    if (role === 'assistant') {
      div.innerHTML = marked.parse(text);
    } else {
      div.textContent = text;
    }
    chatContainer.appendChild(div);
    chatContainer.scrollTop = chatContainer.scrollHeight;
    return div;
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    showChat();
    addMessage('user', text);
    history.push({ role: 'user', content: text });
    userInput.value = '';
    sendBtn.disabled = true;

    const typingDiv = document.createElement('div');
    typingDiv.className = 'typing';
    typingDiv.textContent = 'লিখছে...';
    chatContainer.appendChild(typingDiv);
    chatContainer.scrollTop = chatContainer.scrollHeight;

    try {
      const res = await fetch(BACKEND_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history }),
      });
      const data = await res.json();
      typingDiv.remove();

      if (data.error) {
        addMessage('assistant', '⚠️ সমস্যা হয়েছে: ' + data.error);
      } else {
        addMessage('assistant', data.reply);
        history.push({ role: 'assistant', content: data.reply });
        await saveChatHistory();
      }
    } catch (err) {
      typingDiv.remove();
      addMessage('assistant', '⚠️ সার্ভারের সাথে যোগাযোগ করা যাচ্ছে না।');
    }

    sendBtn.disabled = false;
    userInput.focus();
  }

  sendBtn.addEventListener('click', sendMessage);
  userInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });
</script>

</body>
</html>
